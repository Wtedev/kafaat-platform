# Optional explicit web config path (root railway.toml / railway.json are equivalent).
# Railway UI: Settings → Config-as-Code → /railway/configs/web.railway.toml

[deploy]
preDeployCommand = ["bash railway/predeploy.sh"]
startCommand = "bash railway/start.sh"
healthcheckPath = "/up"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 60
drainingSeconds = 15
